<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jungwook Van (Salieri) — Enterprise Software Developer</title>
    <meta
      name="description"
      content="Jungwook Van (Salieri) — UTS BIT Complete · GPA 6.00 · WAM 80.31. Enterprise software, graphics, deep learning, production infrastructure."
    />
    <meta name="theme-color" content="#0a0b0d" />
    <!--
      Resolve the theme before first paint, or every light-mode visitor gets a
      dark flash. This is the single decision point: App.tsx reads the result
      off data-theme rather than deciding again. The `dark` on <html> stays as
      the fallback for when localStorage/matchMedia throw.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sal-theme');
          document.documentElement.dataset.theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
        } catch (e) {
          /* Private mode or blocked storage — keep the markup default. */
        }
      })();
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jungwook Van (Salieri) — Enterprise Software Developer" />
    <meta
      property="og:description"
      content="Jungwook Van (Salieri) · UTS Bachelor of Information Technology (Complete) · GPA 6.00 · WAM 80.31 · 144 CP. Case studies and a CI/CD voyage chart."
    />
    <meta property="og:site_name" content="Salieri Resume" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Jungwook Van (Salieri) — Enterprise Software Developer" />
    <meta

      content="UTS BIT Complete · GPA 6.00 · WAM 80.31. Deep learning and production infrastructure."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400..800&family=Noto+Sans+KR:wght@400..800&display=swap"
      rel="stylesheet"
    />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
